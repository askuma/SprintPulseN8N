version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sprintpulse
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sprintpulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sprintpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      # Owner account — pre-seeds the first-run wizard so it's skipped on fresh containers
      - N8N_USER_MANAGEMENT_ENABLED=true
      - N8N_OWNER_EMAIL=${N8N_OWNER_EMAIL:-admin@sprintpulse.local}
      - N8N_OWNER_PASSWORD=${N8N_OWNER_PASSWORD:-Sprintpulse_admin1}
      - N8N_OWNER_FIRST_NAME=Admin
      - N8N_OWNER_LAST_NAME=SprintPulse
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=UTC
      - N8N_DB_TYPE=postgresdb
      - N8N_DB_POSTGRESDB_HOST=postgres
      - N8N_DB_POSTGRESDB_PORT=5432
      - N8N_DB_POSTGRESDB_DATABASE=n8n
      - N8N_DB_POSTGRESDB_USER=${N8N_DB_POSTGRESDB_USER:-n8n}
      - N8N_DB_POSTGRESDB_PASSWORD=${N8N_DB_POSTGRESDB_PASSWORD:-n8n_password}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_LOG_LEVEL=info
      - N8N_METRICS=true
      # Allow workflows to read $env.* variables
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      # Expose app credentials to n8n workflows
      - GATEWAY_INTERNAL_URL=http://host.docker.internal:3001
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,ses,kms,secretsmanager
      - DEFAULT_REGION=us-east-1
      - DEBUG=0
    volumes:
      - localstack_data:/var/lib/localstack

volumes:
  postgres_data:
  redis_data:
  n8n_data:
  localstack_data:
